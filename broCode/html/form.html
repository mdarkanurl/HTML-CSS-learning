<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form webpage</title>
</head>
<body>
    <form action="index.php", method="post" enctype="multipart/form-data">

        <label for="username">username</label>
        <input type="text" id="username" placeholder="@username" required>

        <br>
        <br>

        <label for="password">password</label>
        <input
        type="password"
        id="password"
        placeholder="Enter the password"
        required
        minlength="8"
        maxlength="128">

        <br>
        <br>

        <label for="email">email</label>
        <input type="email" id="email" placeholder="mdarkanurl@gmail.com" required>

        <br>
        <br>

        <label for="birthdate">birthdate</label>
        <input type="date" id="birthdate">

        <br>
        <br>

        <label for="quantity">quantity</label>
        <input type="number" id="quantity" min="1" max="99" value="6">

        <br>
        <br>

        <label for="title">title</label>

        <label for="Mr.">Mr.</label>
        <input type="radio" name="title" id="Mr." value="Mr.">

        <label for="Ms.">Ms.</label>
        <input type="radio" name="title" id="Ms." value="Ms.">

        <label for="PhD.">PhD.</label>
        <input type="radio" name="title" id="PhD." value="PhD.">

        <br>
        <br>

        <label for="payments">payment</label>
        <section id="payment">
            <option value="visa">visa</option>
            <option value="mastercard">mastercard</option>
            <option value="giftcard">giftcard</option>
        </section>

        <br>
        <br>

        <label for="subscribe">subscribe</label>
        <input type="checkbox" id="subscribe">

        <br>
        <br>

        <label for="comment">comment</label>
        <textarea id="comment"></textarea>

        <br>
        <br>

        <label for="file">file</label>
        <input type="file" id="file" accept="image/png">

        <br>
        <br>
        <input type="reset">
        <input type="submit">
    </form>
</body>
</html>
