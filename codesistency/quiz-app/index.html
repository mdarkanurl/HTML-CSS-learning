<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>This is a quiz app</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="cantainer">
            <!-- Home default page -->
            <div class="screen active" id="start_screen">
                <h1>Quiz App!</h1>
                <p>Test your knowledge with these fun questions</p>
                <button id="start_btn">Start Quiz</button>
            </div>

            <!-- Question page -->
            <div class="screen" id="quiz_screen">
                <div class="quiz_header">
                    <h2 id="question_text">Question goes here!</h2>

                    <div class="quiz_info">
                        <p>
                            Question <span id="current_question">1</span> of
                            <span id="total_question">5</span>
                        </p>

                        <p>Score: <span id="score">0</span></p>
                    </div>
                    <div>
                        <div
                            id="answers_container"
                            class="answers_container"
                        ></div> <sapn id="final_score">0</sapn>

                        <div class="progres_bar">
                            <div id="progress" class="progress"></div>
                        </div>

                        <!--Result screen-->
                        <div id="result_screen" class="screen">
                            <h1>Quiz Result</h1>
                            <p>
                                You scored <sapn id="final_score">0</sapn> out
                                of <sapn id="max_score">5</sapn>
                            </p>

                            <div id="result_message">Good job!</div>

                            <div>
                                <button id="restart_quiz">Restart Quiz</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
